name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run backend tests
      run: |
        pip install -r requirements.txt pytest httpx
        pytest test_main.py -v

    - name: Run frontend tests
      run: |
        cd frontend
        npm install
        npm run test:run
